aid: liferay
name: Liferay
description: >-
  Liferay DXP is an open-source digital experience platform offering headless
  REST APIs for managing users, roles, permissions, content, and site
  configuration. The Roles API lets you list, retrieve, and associate or
  dissociate regular, site, and organization roles for users.
